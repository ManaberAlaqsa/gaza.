<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دخول المعلمين - مركز منابر الأقصى</title>
<script>
  // تطبيق الوضع الليلي/النهاري فوراً قبل ظهور الصفحة لمنع أي "ومضة" غير مرغوبة
  (function(){
    try{
      var saved = localStorage.getItem('siteTheme');
      if(saved === 'dark') document.documentElement.setAttribute('data-theme','dark');
    }catch(e){}
  })();
</script>
<style>
  :root{
    --olive-deep:#2f3b2a;
    --olive:#4a5d3f;
    --olive-soft:#6b7d5a;
    --cream:#f7f3e8;
    --gold:#c9973f;
    --gold-soft:#e8d4a8;
    --ink:#23291f;
    --error:#a8453a;
    --surface:#fff;
    --surface-alt:#fbf9f3;
    --border:#ece5d2;
    --border-soft:#e3ddc9;
    --muted:#aaa;
    --heading:var(--olive-deep);
  }

  html[data-theme="dark"]{
    --cream:#161b13;
    --ink:#eae5d6;
    --olive-soft:#a9bd97;
    --surface:#232a1e;
    --surface-alt:#1c2117;
    --border:#3a4432;
    --border-soft:#3a4432;
    --muted:#8a917d;
    --heading:#e8d4a8;
  }
  html[data-theme="dark"] body{ transition:background .3s ease, color .3s ease; }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    min-height:100%;
    font-family:'Almarai','Segoe UI',sans-serif;
    background:var(--cream);
    color:var(--ink);
  }
  body{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:20px;
    background:
      radial-gradient(circle at 15% 15%, rgba(201,151,63,0.08), transparent 40%),
      radial-gradient(circle at 85% 85%, rgba(74,93,63,0.12), transparent 45%),
      var(--cream);
  }
  .back-link{
    position:fixed;
    top:24px;
    right:24px;
    font-size:13px;
    color:var(--olive-soft);
    text-decoration:none;
    border-bottom:1px dashed var(--olive-soft);
  }
  .back-link:hover{ color:var(--heading); }

  .card{
    width:100%;
    max-width:380px;
    background:var(--surface);
    border-radius:20px;
    box-shadow:0 18px 40px -16px rgba(47,59,42,0.18);
    padding:36px 30px;
    animation:rise .5s ease both;
  }
  @keyframes rise{
    from{ opacity:0; transform:translateY(12px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .icon-badge{
    width:60px;
    height:60px;
    border-radius:16px;
    background:var(--olive-deep);
    color:var(--gold-soft);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    margin:0 auto 18px;
  }

  .card h1{
    font-size:19px;
    color:var(--heading);
    text-align:center;
    margin-bottom:4px;
  }
  .card .sub{
    font-size:13px;
    color:var(--olive-soft);
    text-align:center;
    margin-bottom:26px;
  }

  .field{ margin-bottom:16px; }
  .field label{
    display:block;
    font-size:13px;
    font-weight:600;
    color:var(--olive);
    margin-bottom:6px;
  }
  .field input{
    width:100%;
    padding:13px 16px;
    border-radius:12px;
    border:1.5px solid var(--border-soft);
    background:var(--surface-alt);
    font-size:15px;
    outline:none;
    font-family:inherit;
    transition:border-color .2s ease, box-shadow .2s ease;
    direction:ltr;
    text-align:left;
  }
  .field input:focus{
    border-color:var(--olive);
    box-shadow:0 0 0 3px rgba(74,93,63,0.1);
    background:var(--surface);
  }
  .field input.invalid{ border-color:var(--error); }

  .submit-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:13px;
    background:var(--olive-deep);
    color:var(--cream);
    font-size:15.5px;
    font-weight:700;
    cursor:pointer;
    margin-top:6px;
    transition:background .2s ease, transform .15s ease;
  }
  .submit-btn:hover{ background:var(--olive); }
  .submit-btn:active{ transform:scale(.98); }
  .submit-btn:disabled{ background:var(--muted); cursor:not-allowed; }

  .global-msg{
    text-align:center;
    font-size:13.5px;
    font-weight:600;
    margin-top:14px;
    min-height:18px;
    opacity:0;
    transition:opacity .2s ease;
    color:var(--error);
  }
  .global-msg.show{ opacity:1; }
</style>
</head>
<body>

  <a href="index.html" class="back-link">→ عودة للرئيسية</a>

  <div class="card">
    <div class="icon-badge">🧑‍🏫</div>
    <h1>دخول المعلمين</h1>
    <p class="sub">مركز منابر الأقصى</p>

    <form id="teacherLoginForm" onsubmit="return false;">
      <div class="field">
        <label>اسم المستخدم</label>
        <input type="text" id="username" autocomplete="username">
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" id="password" autocomplete="current-password">
      </div>
      <button type="submit" class="submit-btn" id="loginBtn">تسجيل الدخول</button>
      <p class="global-msg" id="globalMsg"></p>
    </form>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB0xc27Y_eVcV96Lwm1yj6geQpOtn0dL5M",
    authDomain: "israa-school.firebaseapp.com",
    projectId: "israa-school",
    storageBucket: "israa-school.firebasestorage.app",
    messagingSenderId: "1059398708855",
    appId: "1:1059398708855:web:605a2f3bb74f47e6b9a072"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ══════════════════════════════════════════════
  //  أدوات أمان: تشفير كلمة السر + حماية من التخمين المتكرر
  // ══════════════════════════════════════════════
  function generateSalt(){
    const arr = new Uint8Array(16);
    crypto.getRandomValues(arr);
    return Array.from(arr).map(b => b.toString(16).padStart(2,'0')).join('');
  }
  async function hashPassword(password, salt){
    const enc = new TextEncoder().encode(salt + ':' + password);
    const buf = await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }
  async function verifyPassword(enteredPassword, record){
    if(record.passwordHash && record.passwordSalt){
      const computed = await hashPassword(enteredPassword, record.passwordSalt);
      return { ok: computed === record.passwordHash, needsMigration:false };
    }
    if(typeof record.password === 'string'){
      return { ok: record.password === enteredPassword, needsMigration:true };
    }
    return { ok:false, needsMigration:false };
  }

  const LOGIN_LOCK_MAX_ATTEMPTS = 5;
  const LOGIN_LOCK_WINDOW_MS    = 5 * 60 * 1000;
  function getLoginAttemptState(key){
    try{ const raw = localStorage.getItem('loginAttempts_' + key); return raw ? JSON.parse(raw) : { count:0, lockUntil:0 }; }
    catch(e){ return { count:0, lockUntil:0 }; }
  }
  function setLoginAttemptState(key, state){
    try{ localStorage.setItem('loginAttempts_' + key, JSON.stringify(state)); }catch(e){}
  }
  function getLockRemainingSeconds(key){
    const state = getLoginAttemptState(key);
    if(state.lockUntil && Date.now() < state.lockUntil) return Math.ceil((state.lockUntil - Date.now()) / 1000);
    return 0;
  }
  function recordFailedLogin(key){
    const state = getLoginAttemptState(key);
    state.count = (state.count || 0) + 1;
    if(state.count >= LOGIN_LOCK_MAX_ATTEMPTS){ state.lockUntil = Date.now() + LOGIN_LOCK_WINDOW_MS; state.count = 0; }
    setLoginAttemptState(key, state);
  }
  function clearLoginAttempts(key){ try{ localStorage.removeItem('loginAttempts_' + key); }catch(e){} }
  function formatLockMessage(seconds){
    const m = Math.floor(seconds / 60), s = seconds % 60;
    return `تم إيقاف تسجيل الدخول مؤقتاً بسبب محاولات متكررة، حاول بعد ${m > 0 ? m + ' دقيقة و ' : ''}${s} ثانية`;
  }

  // يجلب بيانات المسؤول الحالية من قاعدة البيانات فقط.
  // لا يوجد أي إنشاء تلقائي لحساب افتراضي هنا عمداً: حساب المسؤول يجب أن يكون موجوداً
  // بالفعل في مستند settings/admin، فلا داعي ولا يجوز تخزين أي اسم مستخدم أو كلمة سر
  // افتراضية داخل الكود المصدري الذي يراه أي زائر عبر "عرض المصدر" في المتصفح.
  async function getAdminCredentials(){
    const ref = doc(db,'settings','admin');
    const snap = await getDoc(ref);
    if(snap.exists()){
      return snap.data();
    }
    // لا يوجد حساب مسؤول في قاعدة البيانات: لا تُنشئ حساباً تلقائياً بكلمة سر معروفة.
    throw new Error('لا يوجد حساب مسؤول في قاعدة البيانات.');
  }

  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');

  // يسمح فقط بالأحرف والرموز الإنجليزية في اسم المستخدم وكلمة المرور
  function enforceEnglishOnly(el){
    if(!el) return;
    el.addEventListener('input', () => {
      const filtered = el.value.replace(/[^\x00-\x7F]/g, '');
      if(filtered !== el.value) el.value = filtered;
    });
  }
  enforceEnglishOnly(usernameInput);
  enforceEnglishOnly(passwordInput);
  const globalMsg     = document.getElementById('globalMsg');
  const loginBtn      = document.getElementById('loginBtn');

  function showError(msg){
    globalMsg.textContent = msg;
    globalMsg.classList.add('show');
    usernameInput.classList.add('invalid');
    passwordInput.classList.add('invalid');
  }
  function clearError(){
    globalMsg.classList.remove('show');
    usernameInput.classList.remove('invalid');
    passwordInput.classList.remove('invalid');
  }

  async function handleLogin(){
    clearError();
    const u = usernameInput.value.trim();
    const p = passwordInput.value;

    if(!u || !p){
      showError('يرجى إدخال اسم المستخدم وكلمة المرور');
      return;
    }

    // ── فحص القفل المؤقت بسبب محاولات متكررة ──
    const lockKey = 'teacherlogin_' + u;
    const remaining = getLockRemainingSeconds(lockKey);
    if(remaining > 0){
      showError(formatLockMessage(remaining));
      return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = 'جاري التحقق...';

    // تحقق من حساب المسؤول (محفوظ في قاعدة البيانات، قابل للتعديل من لوحة المسؤول)
    try{
      const admin = await getAdminCredentials();
      if(u === admin.username){
        const result = await verifyPassword(p, admin);
        if(result.ok){
          clearLoginAttempts(lockKey);
          if(result.needsMigration){
            try{
              const salt = generateSalt();
              const hash = await hashPassword(p, salt);
              await updateDoc(doc(db,'settings','admin'), { passwordHash: hash, passwordSalt: salt, password: null });
            }catch(e){ console.error('فشل ترقية كلمة سر المسؤول:', e); }
          }
          sessionStorage.setItem('isAdmin', 'true');
          sessionStorage.setItem('adminLoginTime', String(Date.now()));
          window.location.href = 'admin-panel.html';
          return;
        }
      }
    }catch(e){ console.error(e); }

    // تحقق من حسابات المعلمين في Firestore
    try{
      const teacherRef  = doc(db, 'teachers', u);
      const teacherSnap = await getDoc(teacherRef);

      if(teacherSnap.exists()){
        const teacher = teacherSnap.data();
        const result  = await verifyPassword(p, teacher);
        if(result.ok){
          clearLoginAttempts(lockKey);
          if(result.needsMigration){
            try{
              const salt = generateSalt();
              const hash = await hashPassword(p, salt);
              await updateDoc(teacherRef, { passwordHash: hash, passwordSalt: salt, password: null });
            }catch(e){ console.error('فشل ترقية كلمة سر المعلم:', e); }
          }
          localStorage.setItem('currentTeacherUsername', u);
          localStorage.setItem('teacherLoginTime', String(Date.now()));
          window.location.href = 'teacher-page.html';
          return;
        }
      }

      recordFailedLogin(lockKey);
      showError('اسم المستخدم أو كلمة المرور غير صحيحة');
    }catch(err){
      console.error(err);
      showError('خطأ في الاتصال، تحقق من الإنترنت');
    }

    loginBtn.disabled = false;
    loginBtn.textContent = 'تسجيل الدخول';
  }

  document.getElementById('teacherLoginForm').addEventListener('submit', handleLogin);
  loginBtn.addEventListener('click', handleLogin);
  passwordInput.addEventListener('keydown', e => { if(e.key === 'Enter') handleLogin(); });
</script>


<script>
// ══════════════════════════════════════════════
//  خاصية إظهار/إخفاء كلمة السر لكل خانات كلمة السر في الصفحة
// ══════════════════════════════════════════════
(function(){
  function wrapPasswordField(inp){
    if(inp.dataset.pwToggled) return;
    inp.dataset.pwToggled = '1';
    var wrap = document.createElement('div');
    wrap.style.position = 'relative';
    inp.parentNode.insertBefore(wrap, inp);
    wrap.appendChild(inp);
    var existingPad = window.getComputedStyle(inp).paddingRight;
    inp.style.paddingRight = 'calc(' + (existingPad || '16px') + ' + 30px)';
    inp.style.boxSizing = 'border-box';
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.setAttribute('aria-label','إظهار/إخفاء كلمة السر');
    btn.textContent = '👁';
    btn.style.cssText = 'position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:16px; padding:4px 4px; line-height:1; opacity:.6; z-index:2;';
    btn.addEventListener('click', function(){
      var showing = inp.type === 'text';
      inp.type = showing ? 'password' : 'text';
      btn.textContent = showing ? '👁' : '🙈';
      btn.style.opacity = showing ? '.6' : '1';
    });
    wrap.appendChild(btn);
  }
  function initAll(){
    document.querySelectorAll('input[type="password"]').forEach(wrapPasswordField);
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', initAll);
  }else{
    initAll();
  }
  // مراقبة أي خانات كلمة سر تُضاف لاحقاً للصفحة ديناميكياً (مع تأخير بسيط لتفادي التكرار الزائد)
  var pwMoTimer = null;
  var mo = new MutationObserver(function(){
    clearTimeout(pwMoTimer);
    pwMoTimer = setTimeout(initAll, 150);
  });
  mo.observe(document.documentElement, { childList:true, subtree:true });
})();
</script>

</body>
</html>
