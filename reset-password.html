<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استعادة كلمة السر - مركز منابر الأقصى</title>
<script>
  (function(){
    try{
      var saved = localStorage.getItem('siteTheme');
      if(saved === 'dark') document.documentElement.setAttribute('data-theme','dark');
    }catch(e){}
  })();
</script>
<style>
  :root{
    --olive-deep:#2f3b2a;
    --olive:#4a5d3f;
    --olive-soft:#6b7d5a;
    --cream:#f7f3e8;
    --gold:#c9973f;
    --gold-soft:#e8d4a8;
    --ink:#23291f;
    --surface:#fff;
    --surface-alt:#fbf9f3;
    --border:#ece5d2;
    --muted:#aaa;
    --heading:var(--olive-deep);
  }
  html[data-theme="dark"]{
    --cream:#161b13;
    --ink:#eae5d6;
    --olive-soft:#a9bd97;
    --surface:#232a1e;
    --surface-alt:#1c2117;
    --border:#3a4432;
    --muted:#8a917d;
    --heading:#e8d4a8;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{ min-height:100%; font-family:'Almarai','Segoe UI',sans-serif; background:var(--cream); color:var(--ink); }
  body{
    background:
      radial-gradient(circle at 10% 0%, rgba(201,151,63,0.08), transparent 40%),
      radial-gradient(circle at 90% 100%, rgba(74,93,63,0.10), transparent 45%),
      var(--cream);
    min-height:100vh; padding:60px 20px; display:flex; justify-content:center; align-items:center;
  }
  .card{
    width:100%; max-width:460px; background:var(--surface); border-radius:20px;
    box-shadow:0 18px 40px -16px rgba(47,59,42,0.18); padding:40px 34px; text-align:center;
    animation:rise .5s ease both;
  }
  @keyframes rise{ from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:translateY(0);} }
  .badge{
    width:64px; height:64px; border-radius:50%;
    background:linear-gradient(160deg, var(--olive), var(--olive-deep));
    display:flex; align-items:center; justify-content:center;
    color:var(--gold-soft); font-size:28px; margin:0 auto 18px;
  }
  h1{ font-size:19px; color:var(--heading); margin-bottom:10px; }
  p{ font-size:14px; line-height:1.9; color:var(--ink); margin-bottom:22px; }
  .back-btn{
    display:inline-block; padding:13px 26px; border-radius:11px;
    background:var(--olive-deep); color:var(--cream); text-decoration:none;
    font-size:14px; font-weight:700; transition:background .2s ease;
  }
  .back-btn:hover{ background:var(--olive); }
</style>
</head>
<body>
  <div class="card">
    <div class="badge">🔑</div>
    <h1>استعادة بيانات الدخول</h1>
    <p>عزيزي الطالب، يرجى التواصل مع إدارة المركز لإتمام عملية إسترجاع بيانات الدخول.</p>
    <a href="index.html" class="back-btn">→ العودة لتسجيل الدخول</a>
  </div>
</body>
</html>
